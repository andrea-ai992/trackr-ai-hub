name: Trackr AI Agents — Scan automatique

on:
  schedule:
    # Toutes les 15 minutes, 24h/24
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  run-agents:
    name: 🤖 Agents scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🔭 MarketScanner + CryptoTracker + CodeReviewer + UIInspector
        run: |
          echo "🚀 Lancement des agents AnDy — $(date)"

          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "User-Agent: TrackrAgents/1.0 (GitHub Actions)" \
            "https://trackr-app-nu.vercel.app/api/discord-cron")

          echo "HTTP Status: $RESPONSE"
          echo "Response:"
          cat /tmp/response.json

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Agents exécutés avec succès"
          else
            echo "⚠️ Erreur HTTP $RESPONSE"
            exit 1
          fi
