<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#10b981" flood-opacity="0.8"/>
    </filter>
    <clipPath id="roundClip">
      <rect x="0" y="0" width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Chart area fill -->
  <clipPath id="chartClip">
    <rect x="64" y="180" width="384" height="220"/>
  </clipPath>
  <g clip-path="url(#chartClip)">
    <path d="M64 370 L130 320 L190 290 L240 310 L285 250 L330 210 L375 195 L448 170 L448 400 L64 400 Z" fill="url(#chartGrad)" opacity="0.5"/>
  </g>

  <!-- Chart line -->
  <path d="M64 370 L130 320 L190 290 L240 310 L285 250 L330 210 L375 195 L448 170"
        fill="none" stroke="url(#lineGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Chart dots -->
  <circle cx="285" cy="250" r="7" fill="#6366f1" opacity="0.8"/>
  <circle cx="330" cy="210" r="7" fill="#6366f1" opacity="0.8"/>

  <!-- End dot (glowing green) -->
  <circle cx="448" cy="170" r="14" fill="#10b981" opacity="0.2" filter="url(#glow)"/>
  <circle cx="448" cy="170" r="9" fill="#10b981" filter="url(#glow)"/>

  <!-- "T" letter mark - top left -->
  <rect x="72" y="80" width="100" height="16" rx="8" fill="url(#glow1)" opacity="0.9"/>
  <rect x="113" y="80" width="18" height="62" rx="9" fill="url(#glow1)" opacity="0.9"/>

  <!-- Bottom label bar -->
  <rect x="64" y="415" width="80" height="10" rx="5" fill="#6366f1" opacity="0.4"/>
  <rect x="160" y="415" width="120" height="10" rx="5" fill="#6366f1" opacity="0.2"/>
  <rect x="296" y="415" width="60" height="10" rx="5" fill="#10b981" opacity="0.3"/>
</svg>
