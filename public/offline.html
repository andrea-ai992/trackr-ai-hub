<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trackr - Offline</title>
  <style>
    :root {
      --neon: #00ff88;
      --bg: #080808;
      --surface: #0f0f0f;
      --surface-low: #111;
      --surface-high: #1a1a1a;
      --text-primary: #e0e0e0;
      --text-secondary: #aaa;
      --text-muted: #555;
      --border: rgba(0, 255, 136, 0.08);
      --border-bright: rgba(0, 255, 136, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--bg);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 1rem;
    }

    .container {
      max-width: 375px;
      width: 100%;
      padding: 2rem;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.05);
    }

    .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
      color: var(--neon);
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    p {
      font-size: 0.9rem;
      margin-bottom: 2rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: var(--surface-high);
      color: var(--neon);
      border: 1px solid var(--border-bright);
      border-radius: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background-color: var(--surface);
      border-color: var(--neon);
    }

    .button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="4" ry="4"></rect>
      <line x1="12" y1="8" x2="12.01" y2="8"></line>
      <line x1="12" y1="12" x2="12.01" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <h1>Offline Mode</h1>
    <p>It looks like you're offline. Please check your internet connection and try again.</p>
    <button class="button" onclick="window.location.reload()">Refresh</button>
  </div>
</body>
</html>
